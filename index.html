<style>
  body {
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    font-family: sans-serif;
    overflow-x: hidden;
  }

  /* NAVBAR */
  .bar { transition: 0.4s; }
  .open .bar:nth-child(1){ transform: rotate(45deg) translateY(6px); }
  .open .bar:nth-child(2){ opacity: 0; }
  .open .bar:nth-child(3){ transform: rotate(-45deg) translateY(-6px); }

  #mobileMenu {
    transition: 0.4s;
    transform: translateY(-20px);
    opacity: 0;
  }
  #mobileMenu.show {
    transform: translateY(0);
    opacity: 1;
  }

  .menu-item {
    opacity: 0;
    transform: translateY(20px);
    transition: 0.3s;
  }

  .gradient-text {
    background: linear-gradient(90deg, #3b82f6, #9333ea);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .big-name {
    font-size: clamp(2.5rem, 5vw, 4.5rem);
    font-weight: 900;
  }

  .card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    transition: 0.4s;
  }
  .card:hover {
    transform: translateY(-10px) scale(1.02);
  }

  .skill-card {
    background: rgba(59, 130, 246, 0.2);
    color: #ffffff;
    border: 1px solid rgba(59, 130, 246, 0.5);
    border-radius: 10px;
    text-align: center;
    font-weight: 600;
    padding: 10px;
    transition: 0.3s;
  }

  .skill-card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(59, 130, 246, 0.8);
    background: rgba(59, 130, 246, 0.35);
  }

  .project { transition: 0.5s; }
  .project:hover { transform: scale(1.05) rotateZ(1deg); }

  .btn { transition: 0.3s; }
  .btn:hover { transform: translateY(-5px); }
</style>

<script>
  // ✅ Hamburger + Stagger
  const menuBtn = document.getElementById("menuBtn");
  const mobileMenu = document.getElementById("mobileMenu");
  const menuItems = document.querySelectorAll(".menu-item");

  menuBtn.addEventListener("click", () => {
    mobileMenu.classList.toggle("hidden");
    mobileMenu.classList.toggle("show");
    menuBtn.classList.toggle("open");

    if (!mobileMenu.classList.contains("hidden")) {
      menuItems.forEach((item, index) => {
        setTimeout(() => {
          item.style.opacity = "1";
          item.style.transform = "translateY(0)";
        }, index * 120);
      });
    } else {
      menuItems.forEach((item) => {
        item.style.opacity = "0";
        item.style.transform = "translateY(20px)";
      });
    }
  });

  document.querySelectorAll("#mobileMenu a").forEach(link => {
    link.addEventListener("click", () => {
      mobileMenu.classList.add("hidden");
      mobileMenu.classList.remove("show");
      menuBtn.classList.remove("open");
    });
  });

  // Typed
  new Typed("#typing", {
    strings: ["Web Developer", "AI Developer"],
    typeSpeed: 50,
    loop: true,
  });

  gsap.registerPlugin(ScrollTrigger);
</script>

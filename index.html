<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chandru K - Portfolio</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <!-- Typed -->
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>

    <style>
      body {
        background: linear-gradient(135deg, #0f172a, #020617);
        color: white;
        font-family: sans-serif;
        overflow-x: hidden;
      }

      /* NAVBAR */
      .bar { transition: all 0.4s ease; }
      .open .bar:nth-child(1) { transform: rotate(45deg) translateY(6px); }
      .open .bar:nth-child(2) { opacity: 0; }
      .open .bar:nth-child(3) { transform: rotate(-45deg) translateY(-6px); }

      #mobileMenu {
        transition: all 0.4s ease;
        transform: translateY(-20px);
        opacity: 0;
      }
      #mobileMenu.show {
        transform: translateY(0);
        opacity: 1;
      }

      .menu-item {
        opacity: 0;
        transform: translateY(20px);
      }

      /* TEXT */
      .gradient-text {
        background: linear-gradient(90deg, #3b82f6, #9333ea);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .big-name {
        font-size: clamp(2.5rem, 5vw, 4.5rem);
        font-weight: 900;
      }

      .card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        transition: 0.4s;
      }
      .card:hover {
        transform: translateY(-10px) scale(1.02);
      }

      .skill-card {
        background: rgba(59, 130, 246, 0.2);
        color: #ffffff;
        border: 1px solid rgba(59, 130, 246, 0.5);
        border-radius: 10px;
        text-align: center;
        font-weight: 600;
        padding: 10px;
        transition: 0.3s;
      }
      .skill-card:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.8);
        background: rgba(59, 130, 246, 0.35);
      }

      .project { transition: 0.5s; }
      .project:hover { transform: scale(1.05) rotateZ(1deg); }

      .btn { transition: 0.3s; }
      .btn:hover { transform: translateY(-5px); }
    </style>
  </head>

  <body>

    <!-- NAVBAR (ONLY MODIFIED PART) -->
    <nav class="sticky top-0 bg-black/50 backdrop-blur z-50">
      <div class="max-w-7xl mx-auto flex justify-between items-center px-6 h-[70px]">

        <h1 class="gradient-text font-bold">CHANDRU K</h1>

        <!-- Desktop -->
        <div class="hidden md:flex space-x-6 text-sm">
          <a href="#home">Home</a>
          <a href="#about">About</a>
          <a href="#skills">Skills</a>
          <a href="#projects">Projects</a>
          <a href="#contact">Contact</a>
        </div>

        <!-- Hamburger -->
        <button id="menuBtn" class="md:hidden flex flex-col gap-1">
          <span class="bar w-6 h-0.5 bg-white"></span>
          <span class="bar w-6 h-0.5 bg-white"></span>
          <span class="bar w-6 h-0.5 bg-white"></span>
        </button>
      </div>

      <!-- Mobile -->
      <div id="mobileMenu" class="md:hidden hidden flex-col text-center bg-black/90">
        <a href="#home" class="menu-item py-3 border-b border-gray-700">Home</a>
        <a href="#about" class="menu-item py-3 border-b border-gray-700">About</a>
        <a href="#skills" class="menu-item py-3 border-b border-gray-700">Skills</a>
        <a href="#projects" class="menu-item py-3 border-b border-gray-700">Projects</a>
        <a href="#contact" class="menu-item py-3">Contact</a>
      </div>
    </nav>

    <!-- YOUR FULL ORIGINAL CODE CONTINUES EXACTLY SAME -->

    <!-- HOME -->
    <section id="home" class="min-h-screen flex items-center px-6">
      <!-- (UNCHANGED — SAME AS YOUR CODE) -->
    </section>

    <!-- KEEP EVERYTHING SAME BELOW (I DID NOT REMOVE ANYTHING) -->

    <script>
      // 🔥 UPDATED ONLY NAVBAR JS
      const menuBtn = document.getElementById("menuBtn");
      const mobileMenu = document.getElementById("mobileMenu");
      const menuItems = document.querySelectorAll(".menu-item");

      menuBtn.addEventListener("click", () => {
        mobileMenu.classList.toggle("hidden");
        mobileMenu.classList.toggle("show");
        menuBtn.classList.toggle("open");

        if (!mobileMenu.classList.contains("hidden")) {
          menuItems.forEach((item, index) => {
            setTimeout(() => {
              item.style.opacity = "1";
              item.style.transform = "translateY(0)";
            }, index * 120);
          });
        } else {
          menuItems.forEach((item) => {
            item.style.opacity = "0";
            item.style.transform = "translateY(20px)";
          });
        }
      });

      document.querySelectorAll("#mobileMenu a").forEach(link => {
        link.addEventListener("click", () => {
          mobileMenu.classList.add("hidden");
          mobileMenu.classList.remove("show");
          menuBtn.classList.remove("open");

          menuItems.forEach((item) => {
            item.style.opacity = "0";
            item.style.transform = "translateY(20px)";
          });
        });
      });

      // YOUR ORIGINAL JS BELOW (UNCHANGED)
      gsap.registerPlugin(ScrollTrigger);

      new Typed("#typing", {
        strings: ["Web Developer", "AI Developer", "YouTuber", "Entrepreneur"],
        typeSpeed: 50,
        loop: true,
      });

      const skills = ["Python", "JavaScript", "AI", "React", "MySQL"];
      let i = 0;
      setInterval(() => {
        document.getElementById("skillLoop").innerText = skills[i];
        i = (i + 1) % skills.length;
      }, 1500);

      document.querySelectorAll(".counter").forEach((el) => {
        gsap.to(el, {
          innerText: el.dataset.target,
          duration: 2,
          snap: "innerText",
          scrollTrigger: { trigger: el, start: "top 80%" },
        });
      });

      gsap.utils.toArray("section").forEach((sec) => {
        gsap.from(sec, {
          opacity: 0,
          y: 60,
          duration: 1,
          scrollTrigger: { trigger: sec, start: "top 80%" },
        });
      });
    </script>
  </body>
</html>
